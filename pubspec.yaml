name: kynos
description: >
  KYNOS — On-device AI running coach with personalised biomechanics and
  Zero-Knowledge privacy.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Icons ───────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17        # SVG rendering for icons and illustrations
  google_fonts: ^6.2.1        # Typography — Inter / DM Sans for athletic UI
  gap: ^3.0.1                 # Semantic spacing widget (replaces SizedBox fillers)
  shimmer: ^3.0.0             # Loading skeleton animations
  fl_chart: ^0.71.0           # Performance charts (HR, power, cadence over time)

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Immutable Models & Serialisation ─────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── Local Storage ────────────────────────────────────────────────────────
  drift: ^2.24.0              # Type-safe SQLite ORM with reactive queries
  sqlite3_flutter_libs: ^0.5.28  # Native SQLite binaries for iOS/Android
  path_provider: ^2.1.4
  path: ^1.9.1

  # ── Health Data ──────────────────────────────────────────────────────────
  health: ^12.2.0              # HealthKit (iOS) + Health Connect (Android)

  # ── Networking (coach ↔ optional remote sync) ────────────────────────────
  dio: ^5.8.0+1

  # ── Config ───────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1    # .env file for secrets (HF_TOKEN, etc.)

  # ── Utilities ────────────────────────────────────────────────────────────
  meta: ^1.17.0               # @immutable / @sealed for domain entities (pure Dart)

  # ── Logging ──────────────────────────────────────────────────────────────
  logger: ^2.5.0

  # ── AI / On-Device Inference ─────────────────────────────────────────────
  flutter_gemma: ^0.12.6    # MediaPipe-backed on-device Gemma inference

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0

  # ── Code Generation ──────────────────────────────────────────────────────
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  drift_dev: ^2.24.0

  # ── Testing ──────────────────────────────────────────────────────────────
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/models/    # Gemma 4 E2B INT4 weights — NOT committed to git
