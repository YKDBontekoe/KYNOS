name: KYNOS Release

on:
  workflow_run:
    workflows: [KYNOS CI]
    types: [completed]
    branches: [main]

concurrency:
  group: kynos-release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Configure Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android keystore secret configured; skipping signed release setup."
            exit 0
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install CocoaPods dependencies
        run: |
          cp .env.example .env
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ios && pod install

      - name: Install semantic-release tooling
        run: npm ci

      - name: Semantic release (APK + unsigned IPA)
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          npx semantic-release 2>&1 | tee semantic-release.log

      - name: Publish release summary
        if: always()
        run: |
          {
            echo "## Semantic release"
            echo
            if grep -q "no new version is released" semantic-release.log; then
              echo "No GitHub release was published for this run."
              echo
              echo "Commits since the last tag did not match [Conventional Commits](https://www.conventionalcommits.org/)."
              echo "Use PR titles like \`feat: add dashboard widgets\` or \`fix(ios): restore HealthKit prompt\`."
              echo
              echo "Recent analyzer output:"
              echo '```'
              rg "Analyzing commit|The release type|The commit should not|Analysis of" semantic-release.log 2>/dev/null \
                || grep -E "Analyzing commit|The release type|The commit should not|Analysis of" semantic-release.log \
                || true
              echo '```'
            elif grep -q "Published release" semantic-release.log; then
              echo "A new release was published."
              echo
              echo '```'
              rg "Published release|The next release version is" semantic-release.log 2>/dev/null \
                || grep -E "Published release|The next release version is" semantic-release.log \
                || true
              echo '```'
            else
              echo "See the semantic-release step log for details."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
