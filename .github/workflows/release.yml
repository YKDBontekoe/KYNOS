name: KYNOS Release

on:
  workflow_run:
    # CI is the single release trigger. Preflight still verifies Security Audit
    # for the same commit, avoiding a duplicate release run when it completes.
    workflows: [KYNOS CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Commit or branch to dry-run
        required: false
        default: main
        type: string
      dry_run:
        description: Analyze the release without publishing artifacts
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: kynos-release-main
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  preflight:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      actions: read
      contents: read
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      next_version: ${{ steps.release.outputs.next_version }}
      target_ref: ${{ steps.target.outputs.target_ref }}
    steps:
      - name: Mint KYNOS Release Bot token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2.1.4
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Resolve target ref
        id: target
        env:
          DISPATCH_REF: ${{ inputs.ref }}
          WORKFLOW_REF: ${{ github.event.workflow_run.head_sha }}
        run: echo "target_ref=${DISPATCH_REF:-${WORKFLOW_REF:-main}}" >> "$GITHUB_OUTPUT"

      - name: Wait for both required main-branch workflows
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          for attempt in {1..30}; do
            runs=$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$HEAD_SHA" --limit 20 \
              --json name,conclusion,event)
            ci=$(jq -r '[.[] | select(.name == "KYNOS CI" and .event == "push") | .conclusion] | first // empty' <<<"$runs")
            security=$(jq -r '[.[] | select(.name == "Security Audit" and .event == "push") | .conclusion] | first // empty' <<<"$runs")
            if [[ "$ci" == success && "$security" == success ]]; then
              exit 0
            fi
            echo "Waiting for KYNOS CI=$ci and Security Audit=$security (attempt $attempt/30)"
            sleep 60
          done
          echo 'Both required workflows did not pass for the target commit.'
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.target.outputs.target_ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Semantic-release preflight
        id: release
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          set -o pipefail
          npx semantic-release --dry-run 2>&1 | tee semantic-release-dry-run.log || {
            cat semantic-release-dry-run.log
            exit 1
          }
          version=$(grep -Eo 'The next release version is [0-9]+\.[0-9]+\.[0-9]+' semantic-release-dry-run.log \
            | tail -1 | awk '{print $6}' || true)
          if [[ -n "$version" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "next_version=$version" >> "$GITHUB_OUTPUT"
            echo "Release candidate: $version"
          else
            echo 'should_release=false' >> "$GITHUB_OUTPUT"
            echo 'next_version=' >> "$GITHUB_OUTPUT"
            echo 'No semantic release is due.'
          fi
      - name: Publish preflight summary
        if: always()
        env:
          TARGET_REF: ${{ steps.target.outputs.target_ref }}
          SHOULD_RELEASE: ${{ steps.release.outputs.should_release }}
          NEXT_VERSION: ${{ steps.release.outputs.next_version }}
        run: |
          {
            echo '## Semantic release preflight'
            echo
            echo "Target: $TARGET_REF"
            echo "Release due: $SHOULD_RELEASE"
            echo "Next version: $NEXT_VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: preflight
    if: >-
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.should_release == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Mint KYNOS Release Bot token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2.1.4
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.target_ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.release-token.outputs.token }}
          persist-credentials: true
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.4.1'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile
          dart run build_runner build --delete-conflicting-outputs
          cd ios && pod install
      - run: npm ci
      - name: Semantic release and publish assets
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          set -o pipefail
          npx semantic-release 2>&1 | tee semantic-release.log
      - name: Attest published IPA
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/kynos-ios-unsigned.ipa
      - name: Publish release summary
        if: always()
        run: |
          {
            echo '## Semantic release'
            echo
            [[ -f semantic-release.log ]] && \
              grep -E 'Published release|The next release version is|No new version' semantic-release.log || true
            echo
            if compgen -G 'dist/*' > /dev/null; then
              for artifact in dist/*; do
                [[ "$artifact" == *.sha256 ]] || shasum -a 256 "$artifact"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
