name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: kynos-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Secret scanning
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

  osv-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Scan all repository lockfiles
        uses: google/osv-scanner-action/osv-scanner-action@daa2c68f50d845057895a9c300e42478481c1d26 # v1.9.1
        with:
          scan-args: |-
            --recursive
            ./

  security-success:
    needs: [gitleaks, dependency-review, osv-scan]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify all security scans passed
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs['dependency-review'].result }}
          OSV_RESULT: ${{ needs['osv-scan'].result }}
        run: |
          [[ "$GITLEAKS_RESULT" == success ]] || { echo "Gitleaks: $GITLEAKS_RESULT"; exit 1; }
          [[ "$OSV_RESULT" == success ]] || { echo "OSV scan: $OSV_RESULT"; exit 1; }
          [[ "$DEPENDENCY_REVIEW_RESULT" == success || "$DEPENDENCY_REVIEW_RESULT" == skipped ]] || {
            echo "Dependency review: $DEPENDENCY_REVIEW_RESULT"
            exit 1
          }
