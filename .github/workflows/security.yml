name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: kynos-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Secret scanning
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high

  osv-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Scan all repository lockfiles
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

  security-success:
    needs: [gitleaks, dependency-review, osv-scan]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify all security scans passed
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs['dependency-review'].result }}
          OSV_RESULT: ${{ needs['osv-scan'].result }}
        run: |
          [[ "$GITLEAKS_RESULT" == success ]] || { echo "Gitleaks: $GITLEAKS_RESULT"; exit 1; }
          [[ "$OSV_RESULT" == success ]] || { echo "OSV scan: $OSV_RESULT"; exit 1; }
          [[ "$DEPENDENCY_REVIEW_RESULT" == success || "$DEPENDENCY_REVIEW_RESULT" == skipped ]] || {
            echo "Dependency review: $DEPENDENCY_REVIEW_RESULT"
            exit 1
          }
