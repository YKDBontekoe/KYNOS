name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Weekly audit on Mondays

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for secret scanning (gitleaks)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dependency Vulnerability Audit (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: --recursive ./

      - name: Outdated Package Check
        run: |
          # Fails if any packages have major version updates (optional threshold)
          flutter pub outdated --no-dev-dependencies --up-to-date --json > outdated.json
          # You can add custom logic here to fail the build if critical packages are old

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --redact --staged
