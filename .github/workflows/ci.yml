name: KYNOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7' # Satisfies Dart SDK ^3.11.1
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Check code generation (build_runner)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || (echo "Generated files are out of sync. Please run build_runner and commit the changes." && exit 1)

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Optional: Requires Codecov setup
          fail_ci_if_error: false
