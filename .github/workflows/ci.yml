name: KYNOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: kynos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4' # Dart 3.12+ required by lottie 3.4 / flutter_gemma 1.2
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Check code generation (build_runner)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || (echo "Generated files are out of sync. Please run build_runner and commit the changes." && exit 1)

      - name: Upload generated code artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          retention-days: 1
          if-no-files-found: error
          path: |
            lib/**/*.g.dart
            lib/**/*.freezed.dart

  analyze:
    needs: bootstrap
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Analyze code
        run: flutter analyze

  test:
    needs: bootstrap
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          retention-days: 1
          path: coverage/lcov.info

  build:
    needs: bootstrap
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.event_name == 'pull_request' || matrix.target == 'web')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: web
            command: flutter build web
          - target: apk
            command: flutter build apk --release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.command }}

  coverage:
    needs: test
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Upload coverage results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Optional: Requires Codecov setup
          fail_ci_if_error: false

  ci-success:
    needs: [bootstrap, analyze, test, build]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify all required jobs passed
        env:
          SKIP_CI: ${{ contains(github.event.head_commit.message, '[skip ci]') }}
          BOOTSTRAP_RESULT: ${{ needs.bootstrap.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [[ "$SKIP_CI" == "true" ]]; then
            echo "CI skipped via commit message"
            exit 0
          fi

          if [[ "$BOOTSTRAP_RESULT" != "success" ]]; then
            echo "bootstrap did not succeed: $BOOTSTRAP_RESULT"
            exit 1
          fi

          for job in analyze test build; do
            result_var="${job^^}_RESULT"
            result="${!result_var}"
            if [[ "$result" != "success" ]]; then
              echo "$job did not succeed: $result"
              exit 1
            fi
          done

  release:
    needs: ci-success
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Configure Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android keystore secret configured; skipping signed release setup."
            exit 0
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install CocoaPods dependencies
        run: |
          cp .env.example .env
          flutter pub get
          cd ios && pod install

      - name: Install semantic-release tooling
        run: npm ci

      - name: Semantic release (APK + unsigned IPA)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
