name: KYNOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: kynos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+
          subjectPatternError: |
            PR titles must use Conventional Commits (for example, `feat: add coach widgets`).
            Keep the subject lowercase after the type prefix.

  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile

      - name: Check generated code
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code -- lib || {
            echo 'Generated files are out of sync. Run build_runner and commit the result.'
            exit 1
          }

      - name: Analyze code
        run: flutter analyze

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check design system conventions
        run: bash scripts/check_design_system.sh

      - name: Check architecture layer imports
        run: bash scripts/check_architecture.sh

      - name: Check CODEMAP freshness
        run: dart run tool/generate_codemap.dart --check

      - name: Check workflow syntax
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: github-check
          fail_level: error

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile

      - name: Run tests with coverage
        run: flutter test --coverage --test-randomize-ordering-seed=random

      - name: Enforce coverage baseline
        run: dart run tool/check_coverage.dart coverage/lcov.info

      - name: Upload coverage results
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-web:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile
      - name: Build web
        run: flutter build web --release

  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle
      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile
      - name: Build Android arm64 release
        run: flutter build apk --release --target-platform android-arm64

  build-ios:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.4.1'
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get --enforce-lockfile
          cd ios && pod install
      - name: Build unsigned iOS release
        run: flutter build ios --release --no-codesign

  ci-success:
    needs: [validate-pr-title, quality, test, build-web, build-apk, build-ios]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs passed
        env:
          PR_TITLE_RESULT: ${{ needs.validate-pr-title.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          WEB_RESULT: ${{ needs['build-web'].result }}
          APK_RESULT: ${{ needs['build-apk'].result }}
          IOS_RESULT: ${{ needs['build-ios'].result }}
        run: |
          [[ "$PR_TITLE_RESULT" == success || "$PR_TITLE_RESULT" == skipped ]] || { echo "PR title validation: $PR_TITLE_RESULT"; exit 1; }
          for result in "$QUALITY_RESULT" "$TEST_RESULT" "$WEB_RESULT" "$APK_RESULT" "$IOS_RESULT"; do
            [[ "$result" == success ]] || { echo "Required job did not succeed: $result"; exit 1; }
          done

      - name: Confirm release workflow is queued on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo 'CI passed; the release workflow will preflight semantic versioning.'
