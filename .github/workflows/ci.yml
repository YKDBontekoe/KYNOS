name: Optimized KYNOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security_and_quality:
    name: Security, Linting, & Tests (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Useful for test optimizations and scanners

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.channel == 'stable' && '3.41.7' || 'any' }}
          channel: ${{ matrix.channel }}
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.dart
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Dependency Auditing
        run: dart pub outdated --no-color

      - name: Install OSV-Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Vulnerability Scan
        run: ./osv-scanner -r .

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Check code generation (build_runner)
        if: matrix.channel == 'stable'
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || (echo "Generated files are out of sync. Please run build_runner and commit the changes." && exit 1)

      - name: Static Analysis
        run: |
          # Custom script to fail on any lint warnings or infos
          output=$(flutter analyze || true)
          echo "$output"
          if echo "$output" | grep -i -E "warning|info"; then
            echo "Lint warnings or infos found! Failing build."
            exit 1
          fi

      - name: Run unit and widget tests with optimizations
        run: |
          # Use --concurrency to run tests concurrently for optimization
          flutter test --coverage --concurrency=4

      - name: Check Test Coverage Threshold
        if: matrix.channel == 'stable'
        run: |
          sudo apt-get install -y lcov
          COVERAGE=$(lcov --summary coverage/lcov.info | grep "lines......" | awk '{print $2}' | cut -d'%' -f1)
          echo "Current test coverage is $COVERAGE%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "Test coverage ($COVERAGE%) is below the minimum threshold (80%)."
            exit 1
          fi

  build_and_analyze:
    name: Build & Analyze Bundle Size
    runs-on: ubuntu-latest
    needs: security_and_quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Build Android App Bundle and Analyze Size
        run: |
          flutter build appbundle --analyze-size > build_size_report.txt || true

          # Extract important data for the report
          echo "### 📦 App Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat build_size_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Check if the build was actually successful
          if [ ! -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "Build failed!"
            exit 1
          fi
