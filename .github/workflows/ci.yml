name: KYNOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: kynos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR titles must use Conventional Commits (for example, `feat: add coach widgets`).
            Keep the subject lowercase after the type prefix.

  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4' # Dart 3.12+ required by lottie 3.4 / flutter_gemma 1.2
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Check code generation (build_runner)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || (echo "Generated files are out of sync. Please run build_runner and commit the changes." && exit 1)

      - name: Upload generated code artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          retention-days: 1
          if-no-files-found: error
          path: |
            lib/**/*.g.dart
            lib/**/*.freezed.dart

  analyze:
    needs: bootstrap
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Analyze code
        run: flutter analyze

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check design system conventions
        run: bash scripts/check_design_system.sh

      - name: Check architecture layer imports
        run: bash scripts/check_architecture.sh

      - name: Check CODEMAP freshness
        run: dart run tool/generate_codemap.dart --check

  test:
    needs: bootstrap
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          retention-days: 1
          path: coverage/lcov.info

  build-web:
    needs: bootstrap
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Build web
        run: flutter build web

  # Disabled by default — a universal APK build adds ~15–25 min per PR on Ubuntu
  # while build-web already validates compilation. IPA is only built on release.
  # Re-enable by setting repository variable CI_BUILD_APK=true.
  build-apk:
    needs: bootstrap
    if: >-
      vars.CI_BUILD_APK == 'true' &&
      github.event_name == 'pull_request' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cp .env.example .env
          flutter pub get

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Build apk
        run: flutter build apk --release --target-platform android-arm64

  coverage:
    needs: test
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Upload coverage results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Optional: Requires Codecov setup
          fail_ci_if_error: false

  ci-success:
    needs: [validate-pr-title, bootstrap, analyze, test, build-web, build-apk]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify all required jobs passed
        env:
          SKIP_CI: ${{ contains(github.event.head_commit.message, '[skip ci]') }}
          PR_TITLE_RESULT: ${{ needs.validate-pr-title.result }}
          BOOTSTRAP_RESULT: ${{ needs.bootstrap.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_WEB_RESULT: ${{ needs['build-web'].result }}
          BUILD_APK_RESULT: ${{ needs['build-apk'].result }}
        run: |
          if [[ "$SKIP_CI" == "true" ]]; then
            echo "CI skipped via commit message"
            exit 0
          fi

          if [[ "$PR_TITLE_RESULT" != "success" && "$PR_TITLE_RESULT" != "skipped" ]]; then
            echo "validate-pr-title did not succeed: $PR_TITLE_RESULT"
            exit 1
          fi

          if [[ "$BOOTSTRAP_RESULT" != "success" ]]; then
            echo "bootstrap did not succeed: $BOOTSTRAP_RESULT"
            exit 1
          fi

          for result in "$ANALYZE_RESULT" "$TEST_RESULT" "$BUILD_WEB_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "A required job did not succeed: $result"
              exit 1
            fi
          done

          if [[ "$BUILD_APK_RESULT" != "success" && "$BUILD_APK_RESULT" != "skipped" ]]; then
            echo "build-apk did not succeed: $BUILD_APK_RESULT"
            exit 1
          fi

      - name: Queue semantic release
        if: >-
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        run: echo "CI passed; KYNOS Release workflow will publish when conventional commits warrant a version bump."
