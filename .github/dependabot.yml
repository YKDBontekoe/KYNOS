version: 2
updates:
  - package-ecosystem: pub
    directory: "/"
    # Dependabot opens PRs against main; branch protection then requires the
    # full CI and security aggregates plus approval before merge. Keep Pub
    # updates isolated because major plugin updates can require source changes.
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
    groups:
      release-tooling:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: friday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
